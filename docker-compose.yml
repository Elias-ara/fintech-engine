version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: fintech-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fintech_engine
      POSTGRES_USER: fintech
      POSTGRES_PASSWORD: fintech123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintech -d fintech_engine"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: fintech-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fintech_engine
      SPRING_DATASOURCE_USERNAME: fintech
      SPRING_DATASOURCE_PASSWORD: fintech123
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
